<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NiftySignals — Professional Trading Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#00b386;--gl:#e6f7f3;--gd:#009972;
  --r:#e5383b;--rl:#fdecea;
  --y:#f59e0b;--yl:#fef3c7;
  --b:#2563eb;--bl:#eff6ff;
  --p:#7c3aed;--pl:#f3f0ff;
  --bg:#f0f2f5;--card:#fff;--border:#e5e7eb;
  --t1:#0f172a;--t2:#64748b;--t3:#94a3b8;
  --sh:0 1px 3px rgba(15,23,42,.06);
  --sh2:0 4px 24px rgba(15,23,42,.08);
  --sh3:0 12px 40px rgba(15,23,42,.12);
  --font:'DM Sans',sans-serif;
  --rad:14px;--pill:999px;
}
body{background:var(--bg);color:var(--t1);font-family:var(--font);font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased}

/* LOGIN */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0fdf8,#e0f4ff,#f5f6fa)}
.lcard{background:var(--card);border-radius:24px;padding:52px 48px;width:420px;box-shadow:var(--sh3)}
.lbrand{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.lico{width:44px;height:44px;background:var(--g);border-radius:13px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700}
.lname{font-size:24px;font-weight:700;letter-spacing:-.5px}
.lsub{color:var(--t2);font-size:13px;margin-bottom:36px}
.lf label{display:block;font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.lf input{width:100%;padding:13px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);font-family:var(--font);font-size:14px;color:var(--t1);outline:none;margin-bottom:14px;transition:border-color .2s}
.lf input:focus{border-color:var(--g);background:#fff}
.lbtn{width:100%;padding:14px;background:var(--g);color:#fff;border:none;border-radius:10px;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.lbtn:hover{background:var(--gd)}.lbtn:disabled{opacity:.5;cursor:not-allowed}
.lerr{color:var(--r);font-size:12px;margin-top:10px;display:none}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}

/* TOPBAR */
#topbar{height:56px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:400;box-shadow:var(--sh)}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-ico{width:30px;height:30px;background:var(--g);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700}
.tb-name{font-size:16px;font-weight:700;letter-spacing:-.3px}
.tb-right{display:flex;align-items:center;gap:12px}
.mbadge{padding:4px 11px;border-radius:var(--pill);font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px}
.mo{background:var(--gl);color:var(--g)}.mc{background:#f1f5f9;color:var(--t2)}
.tb-meta{font-size:11px;color:var(--t3)}.tb-meta b{color:var(--g);font-weight:600}
.sout{padding:5px 12px;border:1.5px solid var(--border);border-radius:7px;background:none;font-family:var(--font);font-size:12px;font-weight:500;color:var(--t2);cursor:pointer}
.sout:hover{border-color:var(--r);color:var(--r)}

/* NOTIFICATION BELL */
.bell-wrap{position:relative}
.bell-btn{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s;position:relative}
.bell-btn:hover{background:var(--gl);border-color:var(--g)}
.bell-badge{position:absolute;top:-4px;right:-4px;width:17px;height:17px;background:var(--r);border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid var(--card);display:none}
.bell-badge.show{display:flex}

/* NOTIFICATION PANEL */
#notif-panel{position:absolute;top:50px;right:0;width:380px;background:var(--card);border-radius:16px;box-shadow:var(--sh3);border:1px solid var(--border);z-index:500;display:none;overflow:hidden}
#notif-panel.open{display:block;animation:fadeSlide .2s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.np-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.np-title{font-size:14px;font-weight:700}
.np-clear{font-size:12px;color:var(--g);cursor:pointer;font-weight:600}
.np-clear:hover{text-decoration:underline}
.np-list{max-height:400px;overflow-y:auto}
.np-empty{padding:40px;text-align:center;color:var(--t3);font-size:13px}
.np-item{padding:14px 18px;border-bottom:1px solid #f8fafc;display:flex;gap:12px;align-items:flex-start;transition:background .1s}
.np-item:hover{background:#f9fffe}
.np-item.unread{background:#f0fdf8}
.np-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ni-buy{background:var(--gl)}.ni-sell{background:var(--rl)}.ni-rsi{background:var(--pl)}
.np-body{}
.np-ntitle{font-size:13px;font-weight:600;margin-bottom:2px}
.np-ndesc{font-size:11px;color:var(--t2);margin-bottom:3px}
.np-ntime{font-size:10px;color:var(--t3)}

/* TOAST NOTIFICATION */
#toast-container{position:fixed;top:70px;right:20px;z-index:600;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card);border-radius:12px;box-shadow:var(--sh3);border-left:4px solid;padding:12px 16px;min-width:280px;max-width:360px;pointer-events:all;animation:toastIn .3s ease;display:flex;gap:12px;align-items:flex-start}
.toast-buy{border-color:var(--g)}.toast-sell{border-color:var(--r)}.toast-rsi{border-color:var(--p)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast-icon{font-size:20px;flex-shrink:0}
.toast-body{}
.toast-title{font-size:13px;font-weight:700;margin-bottom:2px}
.toast-desc{font-size:11px;color:var(--t2)}
.toast-close{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--t3);font-size:14px;padding:0 4px;align-self:flex-start}

/* TABSTRIP */
#tabstrip{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:2px;position:sticky;top:56px;z-index:300;overflow-x:auto;scrollbar-width:none}
#tabstrip::-webkit-scrollbar{display:none}
.tab{padding:13px 18px;border:none;background:none;font-family:var(--font);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:7px;transition:color .15s,border-color .15s}
.tab:hover{color:var(--t1)}.tab.active{color:var(--g);border-bottom-color:var(--g);font-weight:600}
.tcnt{padding:2px 7px;border-radius:var(--pill);font-size:10px;font-weight:700}
.ca{background:#f1f5f9;color:var(--t2)}.cb{background:var(--gl);color:var(--g)}.cs{background:var(--rl);color:var(--r)}.ch{background:var(--yl);color:var(--y)}.cp{background:var(--pl);color:var(--p)}

/* FILTER BAR */
#filter-bar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#filter-bar.hidden{display:none}
.fb-search{position:relative;flex:1;min-width:160px;max-width:260px}
.fb-search input{width:100%;padding:8px 12px 8px 32px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);font-family:var(--font);font-size:13px;color:var(--t1);outline:none}
.fb-search input:focus{border-color:var(--g)}
.fb-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px;pointer-events:none}
.fb-sel{padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);font-family:var(--font);font-size:12px;color:var(--t1);outline:none;cursor:pointer}
.fb-sel:focus{border-color:var(--g)}
.sort-btn{padding:7px 12px;border-radius:8px;border:1.5px solid var(--border);background:none;font-family:var(--font);font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}
.sort-btn:hover{border-color:var(--g);color:var(--g)}
.sort-btn.active{background:var(--gl);border-color:var(--g);color:var(--g)}
.age-chips{display:flex;gap:5px}
.age-chip{padding:5px 11px;border-radius:var(--pill);border:1.5px solid var(--border);background:none;font-family:var(--font);font-size:11px;font-weight:600;color:var(--t2);cursor:pointer}
.age-chip.active{background:var(--gl);border-color:var(--g);color:var(--g)}
.fb-right{margin-left:auto;font-size:12px;color:var(--t3);font-weight:500}

/* CONTENT */
#content{padding:20px 24px;flex:1}
.panel{display:none}.panel.active{display:block}

/* ── INDEX CARDS ─────────────────────────────────────────── */
.idx-section{margin-bottom:22px}
.idx-section-title{font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.idx-cards{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr 1fr;gap:12px}
@media(max-width:900px){.idx-cards{grid-template-columns:1fr 1fr;}}
@media(max-width:500px){.idx-cards{grid-template-columns:1fr;}}
.idx-card{background:var(--card);border-radius:var(--rad);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden;transition:box-shadow .2s}
.idx-card:hover{box-shadow:var(--sh2)}
.idx-card.primary{background:linear-gradient(135deg,#0f172a,#1e3a5f);border:none}
.idx-card-top{padding:14px 16px 10px}
.idx-card.primary .idx-card-top{padding:18px 20px 12px}
.idx-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.idx-card.primary .idx-lbl{color:rgba(255,255,255,.45)}
.idx-val{font-size:20px;font-weight:700;color:var(--t1);margin-bottom:2px;letter-spacing:-.4px}
.idx-card.primary .idx-val{font-size:28px;color:#fff}
.idx-chg{font-size:12px;font-weight:600;margin-bottom:8px}
.idx-meta{display:flex;gap:12px;font-size:10px;color:var(--t3)}
.idx-card.primary .idx-meta{color:rgba(255,255,255,.4)}
.idx-periods{display:flex;gap:4px;padding:8px 12px 6px;border-top:1px solid var(--border);flex-wrap:wrap}
.idx-card.primary .idx-periods{border-top:1px solid rgba(255,255,255,.1)}
.idx-per-btn{padding:3px 8px;border-radius:5px;border:none;background:none;font-family:var(--font);font-size:10px;font-weight:600;color:var(--t3);cursor:pointer}
.idx-per-btn.active{background:var(--gl);color:var(--g)}
.idx-card.primary .idx-per-btn.active{background:rgba(0,179,134,.2);color:#00e5a8}
.idx-chart-wrap{height:70px;padding:0 8px 8px;position:relative}
.idx-card.primary .idx-chart-wrap{height:90px}
canvas.idx-chart{width:100%;height:100%;display:block}

/* ── STOCK TABLE ─────────────────────────────────────────── */
.stk-table-card{background:var(--card);border-radius:var(--rad);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden}
.stk-table{width:100%;border-collapse:collapse}
.stk-table thead th{background:#f8fafc;padding:10px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.stk-table tbody td{padding:11px 16px;border-bottom:1px solid #f8fafc;vertical-align:middle}
.stk-table tbody tr:last-child td{border-bottom:none}
.stk-table tbody tr{cursor:pointer;transition:background .1s}
.stk-table tbody tr:hover td{background:#f9fffe}
.stk-sym{font-size:13px;font-weight:700}
.stk-co{font-size:11px;color:var(--t3);max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stk-tag{background:#f1f5f9;color:var(--t2);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:500}
.pm{font-size:13px;font-weight:700}.pu{color:var(--g);font-size:11px;font-weight:600}.pd{color:var(--r);font-size:11px;font-weight:600}.pf{color:var(--t3);font-size:11px}
.sp{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:var(--pill);font-size:10px;font-weight:700}
.spb{background:var(--gl);color:var(--g)}.sps{background:var(--rl);color:var(--r)}.sph{background:var(--yl);color:var(--y)}

/* ── SIGNAL CARDS ─────────────────────────────────────────── */
.si-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.si-headline{font-size:17px;font-weight:700}
.si-sub{font-size:13px;color:var(--t2)}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.scard{background:var(--card);border-radius:var(--rad);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s}
.scard:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.sc-top{padding:16px 18px 12px;border-bottom:1px solid #f8fafc}
.sc-r1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.sc-sym{font-size:17px;font-weight:700}.sc-co{font-size:11px;color:var(--t2);margin-top:1px}
.sc-ltp{font-size:21px;font-weight:700}.sc-pct{font-size:12px;font-weight:600;margin-top:2px}
.sc-date{font-size:11px;color:var(--t3);margin-top:4px;display:flex;align-items:center;gap:4px}
.sc-chart{height:80px;border-bottom:1px solid #f3f4f6;position:relative;overflow:hidden}
canvas.cc{width:100%;height:80px;display:block}
.sc-reas{padding:12px 18px;border-bottom:1px solid #f8fafc}
.reas-hd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:9px}
.ri{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}.ri:last-child{margin-bottom:0}
.rn{width:21px;height:21px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.rnb{background:var(--gl);color:var(--g)}.rns{background:var(--rl);color:var(--r)}
.rt{font-size:12px;font-weight:600;margin-bottom:1px}.rd{font-size:11px;color:var(--t2);line-height:1.4}
.sc-foot{padding:11px 18px;background:#fafbfc;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.fstats{display:flex;gap:14px}
.fsl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px}
.fsv{font-size:13px;font-weight:700}
.cbtn{padding:7px 14px;background:var(--g);color:#fff;border:none;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer}
.cbtn:hover{background:var(--gd)}

/* ── HOLD LIST ─────────────────────────────────────────────── */
.hlist{display:flex;flex-direction:column;gap:8px}
.hitem{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px 18px;display:grid;grid-template-columns:190px 110px 1fr 110px auto;gap:12px;align-items:center;box-shadow:var(--sh);cursor:pointer;transition:box-shadow .15s}
.hitem:hover{box-shadow:var(--sh2)}
.hi-sym{font-size:14px;font-weight:700}.hi-co{font-size:11px;color:var(--t3);max-width:175px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.hi-pr{font-size:15px;font-weight:700}.hi-pct{font-size:12px;font-weight:600;margin-top:1px}
.conds-prog{display:flex;flex-direction:column;gap:4px}
.prog-label{font-size:10px;font-weight:600;color:var(--t3);margin-bottom:2px}
.prog-bar-bg{height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.cchips{display:flex;gap:5px;flex-wrap:wrap}
.cchip{padding:3px 9px;border-radius:6px;font-size:10px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.cok{background:var(--gl);color:var(--g)}.cno{background:#f1f5f9;color:var(--t3)}
.hvb{padding:6px 12px;border:1.5px solid var(--border);border-radius:7px;background:none;font-family:var(--font);font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap}
.hvb:hover{border-color:var(--g);color:var(--g)}

/* ── RSI SCREENER ─────────────────────────────────────────── */
.rsi-intro{margin-bottom:16px}
.rsi-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;background:var(--card);padding:14px 18px;border-radius:var(--rad);border:1px solid var(--border)}
.rsi-controls label{font-size:11px;font-weight:600;color:var(--t2);margin-right:4px}
.rsi-range-wrap{display:flex;align-items:center;gap:8px;font-size:12px}
.rsi-input{width:60px;padding:6px 8px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);font-family:var(--font);font-size:13px;font-weight:600;color:var(--t1);outline:none;text-align:center}
.rsi-input:focus{border-color:var(--p)}
.rsi-fetch-btn{padding:8px 16px;background:var(--p);color:#fff;border:none;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
.rsi-fetch-btn:hover{opacity:.85}
.rsi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.rsi-card{background:var(--card);border-radius:var(--rad);border:1px solid var(--border);box-shadow:var(--sh);padding:16px 18px;cursor:pointer;transition:box-shadow .2s}
.rsi-card:hover{box-shadow:var(--sh2)}
.rc-r1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.rc-sym{font-size:15px;font-weight:700}.rc-co{font-size:11px;color:var(--t2);margin-top:1px}
.rc-rsi-big{font-size:26px;font-weight:700;color:var(--p)}
.rc-rsi-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
.rsi-bar-wrap{margin:10px 0;position:relative}
.rsi-bar-bg{height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden;position:relative}
.rsi-zones{position:absolute;inset:0;display:flex}
.rsi-zone-os{flex:30%;background:rgba(229,56,59,.1)}
.rsi-zone-n{flex:40%;background:transparent}
.rsi-zone-ob{flex:30%;background:rgba(0,179,134,.1)}
.rsi-bar-fill{height:100%;background:var(--p);border-radius:4px;transition:width .4s}
.rsi-bar-marker{position:absolute;top:-3px;width:14px;height:14px;background:var(--p);border-radius:50%;border:2px solid var(--card);transform:translateX(-50%);transition:left .4s}
.rsi-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-top:3px}
.rc-meta{display:flex;gap:12px;font-size:11px;color:var(--t2)}
.rc-arrow-up{color:var(--g);font-weight:700}.rc-arrow-dn{color:var(--r);font-weight:700}

/* ── CHART MODAL ─────────────────────────────────────────────── */
#mbg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
#mbg.open{display:flex}
#mbox{background:var(--card);width:100%;max-width:960px;max-height:95vh;border-radius:22px 22px 0 0;overflow-y:auto;animation:su .22s ease;box-shadow:0 -8px 48px rgba(15,23,42,.18)}
@keyframes su{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhdl{width:36px;height:4px;background:var(--border);border-radius:2px;margin:13px auto 0}
.mtop{padding:16px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.minfo{display:flex;align-items:center;gap:14px}
.msym{font-size:21px;font-weight:700}.mco{font-size:13px;color:var(--t2)}
.mltp{font-size:23px;font-weight:700}.mpct{font-size:13px;font-weight:600;margin-top:2px}
.mcls{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:none;font-size:15px;cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center}
.mcls:hover{background:var(--rl);border-color:var(--r);color:var(--r)}
.mbody{padding:18px 24px 32px}
.mperrow{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.mper{padding:5px 12px;border-radius:var(--pill);border:1.5px solid var(--border);background:none;font-family:var(--font);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer}
.mper.active{background:var(--g);border-color:var(--g);color:#fff}
.mind-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.mind{padding:5px 11px;border-radius:var(--pill);border:1.5px solid var(--border);background:none;font-family:var(--font);font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:4px}
.mind-dot{width:7px;height:7px;border-radius:50%}
.mind.active{border-color:currentColor}
.mchart-price{height:280px;width:100%;margin-bottom:8px}
.mchart-rsi{height:100px;width:100%;margin-bottom:8px}
.mchart-vol{height:70px;width:100%;margin-bottom:16px}
canvas.mc{width:100%;height:100%;display:block}
.mch{font-size:14px;font-weight:700;margin-bottom:12px}
.mccg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:20px}
.mcc{border-radius:11px;padding:13px 15px;border:1.5px solid}
.mcc.ok{background:var(--gl);border-color:#6ee7b7}.mcc.no{background:#f8fafc;border-color:var(--border)}
.mci{font-size:18px;margin-bottom:6px}
.mct{font-size:12px;font-weight:700;margin-bottom:2px}
.mcc.ok .mct{color:var(--g)}.mcc.no .mct{color:var(--t3)}
.mcd{font-size:11px;color:var(--t2);line-height:1.4}
.msts{display:flex;gap:10px;flex-wrap:wrap}
.mst{background:var(--bg);border-radius:10px;padding:10px 14px;flex:1 1 88px}
.mstl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.mstv{font-size:14px;font-weight:700}

.empty{text-align:center;padding:56px 20px}
.ei{font-size:40px;margin-bottom:12px}
.et{font-size:16px;font-weight:700;margin-bottom:5px}
.es{font-size:13px;color:var(--t2)}
.lbox{text-align:center;padding:60px;color:var(--t3)}
.spin{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--g);border-radius:50%;animation:sp .65s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
@media(max-width:700px){
  #topbar,#tabstrip,#filter-bar,#content{padding-left:14px;padding-right:14px}
  .sgrid,.rsi-grid{grid-template-columns:1fr}
  .hitem{grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto auto}
  .hitem .hvb{grid-column:1/-1}
  .mccg{grid-template-columns:1fr 1fr}
  .mbody{padding:14px 16px 28px}
}
</style>
</head>
<body>

<div id="login-page">
  <div class="lcard">
    <div class="lbrand"><div class="lico">N</div><div class="lname">NiftySignals</div></div>
    <p class="lsub">Professional Nifty 500 trading signal terminal.</p>
    <div class="lf">
      <label>Email Address</label>
      <input type="email" id="lem" placeholder="trader@nifty.com" autocomplete="username"/>
      <label>Password</label>
      <input type="password" id="lpw" placeholder="Your password" autocomplete="current-password"/>
      <button class="lbtn" id="lbtn">Sign In</button>
    </div>
    <div class="lerr" id="lerr">Invalid email or password.</div>
  </div>
</div>

<div id="app">
  <div id="topbar">
    <div class="tb-left">
      <div class="tb-ico">N</div>
      <div class="tb-name">NiftySignals</div>
    </div>
    <div class="tb-right">
      <span id="mbadge" class="mbadge mc">● MARKET CLOSED</span>
      <span class="tb-meta" id="upd"></span>
      <span class="tb-meta">Refresh in <b id="cd">60</b>s</span>
      <div class="bell-wrap">
        <button class="bell-btn" id="bell-btn" title="Notifications">🔔</button>
        <span class="bell-badge" id="bell-badge">0</span>
        <div id="notif-panel">
          <div class="np-head">
            <span class="np-title">🔔 Notifications</span>
            <span class="np-clear" id="np-clear">Mark all read</span>
          </div>
          <div class="np-list" id="np-list"><div class="np-empty">No notifications yet</div></div>
        </div>
      </div>
      <button class="sout" id="sout">Sign Out</button>
    </div>
  </div>

  <div id="tabstrip">
    <button class="tab active" id="t-market">📊 Live Market <span class="tcnt ca" id="cnt-a">—</span></button>
    <button class="tab" id="t-buy">▲ Buy Signals <span class="tcnt cb" id="cnt-b">0</span></button>
    <button class="tab" id="t-sell">▼ Sell Signals <span class="tcnt cs" id="cnt-s">0</span></button>
    <button class="tab" id="t-hold">— Hold <span class="tcnt ch" id="cnt-h">0</span></button>
    <button class="tab" id="t-rsi">📈 RSI Screener <span class="tcnt cp" id="cnt-r">—</span></button>
  </div>

  <div id="filter-bar">
    <div class="fb-search"><span class="fb-ico">🔍</span><input type="text" id="qry" placeholder="Search symbol or company…"/></div>
    <select class="fb-sel" id="sec"><option value="">All Sectors</option></select>
    <div class="age-chips" id="age-chips" style="display:none">
      <button class="age-chip active" data-age="all">All Time</button>
      <button class="age-chip" data-age="today">Today</button>
      <button class="age-chip" data-age="week">This Week</button>
      <button class="age-chip" data-age="month">This Month</button>
    </div>
    <div id="sort-opts" style="display:none;gap:5px;display:none">
      <button class="sort-btn active" data-sort="date">🕐 Latest First</button>
      <button class="sort-btn" data-sort="pnl_best">📈 Best P&L</button>
      <button class="sort-btn" data-sort="pnl_worst">📉 Worst P&L</button>
    </div>
    <span class="fb-right" id="rlbl"></span>
  </div>

  <div id="content">
    <div id="p-market" class="panel active"><div class="lbox"><div class="spin"></div><br>Loading…</div></div>
    <div id="p-buy"    class="panel"><div class="lbox"><div class="spin"></div><br>Loading…</div></div>
    <div id="p-sell"   class="panel"><div class="lbox"><div class="spin"></div><br>Loading…</div></div>
    <div id="p-hold"   class="panel"><div class="lbox"><div class="spin"></div><br>Loading…</div></div>
    <div id="p-rsi"    class="panel"><div class="lbox"><div class="spin"></div><br>Loading…</div></div>
  </div>
</div>

<div id="toast-container"></div>

<div id="mbg">
  <div id="mbox">
    <div class="mhdl"></div>
    <div class="mtop">
      <div class="minfo">
        <div><div class="msym" id="msym">—</div><div class="mco" id="mco">—</div></div>
        <span class="sp" id="msp">—</span>
      </div>
      <div style="display:flex;align-items:center;gap:16px">
        <div><div class="mltp" id="mltp">—</div><div class="mpct" id="mpct">—</div></div>
        <button class="mcls" id="mcls">✕</button>
      </div>
    </div>
    <div class="mbody">
      <div class="mperrow">
        <button class="mper" data-per="1D">1D</button>
        <button class="mper" data-per="1W">1W</button>
        <button class="mper active" data-per="3M">3M</button>
        <button class="mper" data-per="6M">6M</button>
        <button class="mper" data-per="1Y">1Y</button>
        <button class="mper" data-per="5Y">5Y</button>
        <button class="mper" data-per="ALL">ALL</button>
      </div>
      <div class="mind-row">
        <button class="mind active" data-ind="sma5"  style="color:#f59e0b"><span class="mind-dot" style="background:#f59e0b"></span>SMA5</button>
        <button class="mind active" data-ind="ema13" style="color:#00b386"><span class="mind-dot" style="background:#00b386"></span>EMA13</button>
        <button class="mind active" data-ind="ema26" style="color:#e5383b"><span class="mind-dot" style="background:#e5383b"></span>EMA26</button>
        <button class="mind active" data-ind="rsi"   style="color:#7c3aed"><span class="mind-dot" style="background:#7c3aed"></span>RSI 14</button>
        <button class="mind active" data-ind="vol"   style="color:#64748b"><span class="mind-dot" style="background:#64748b"></span>Volume</button>
        <button class="mind active" data-ind="conj"  style="color:#8b5cf6"><span class="mind-dot" style="background:#8b5cf6"></span>Zones</button>
      </div>
      <div class="mchart-price"><canvas class="mc" id="mc-price"></canvas></div>
      <div class="mchart-rsi"><canvas class="mc" id="mc-rsi"></canvas></div>
      <div class="mchart-vol"><canvas class="mc" id="mc-vol"></canvas></div>
      <div class="mch" id="mch">Signal Conditions</div>
      <div class="mccg" id="mccg"></div>
      <div class="msts" id="msts"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const B="https://niftysignals.onrender.com";
fetch(B+"/api/health").catch(()=>{});

let tok=localStorage.getItem("ns_t")||"";
let stocks=[],curTab="market",cdSec=60,cdInt=null;
let mChPrice=null,mChRSI=null,mChVol=null,mData=null,mPer="3M";
let inds={sma5:1,ema13:1,ema26:1,rsi:1,vol:1,conj:1};
let curSort="date",curAge="all";
let notifs=[],unreadCount=0;
let idxCharts={};

// ── WIRING ────────────────────────────────────────────────
document.getElementById("lbtn").addEventListener("click",login);
document.getElementById("sout").addEventListener("click",logout);
document.getElementById("lem").addEventListener("keydown",e=>{if(e.key==="Enter")login();});
document.getElementById("lpw").addEventListener("keydown",e=>{if(e.key==="Enter")login();});
document.getElementById("mcls").addEventListener("click",closeModal);
document.getElementById("mbg").addEventListener("click",e=>{if(e.target===document.getElementById("mbg"))closeModal();});
document.getElementById("qry").addEventListener("input",render);
document.getElementById("sec").addEventListener("change",render);
document.getElementById("bell-btn").addEventListener("click",toggleNotifPanel);
document.getElementById("np-clear").addEventListener("click",markAllRead);

document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>goTab(t.id.replace("t-",""))));
document.querySelectorAll(".mper").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".mper").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); mPer=b.dataset.per; if(mData)loadChartData(mData.sym,mPer);
}));
document.querySelectorAll(".mind").forEach(b=>b.addEventListener("click",()=>{
  const k=b.dataset.ind; inds[k]=!inds[k]; b.classList.toggle("active",!!inds[k]);
  if(mData)renderCharts(mData.ohlcv||[]);
}));
document.querySelectorAll(".age-chip").forEach(c=>c.addEventListener("click",()=>{
  document.querySelectorAll(".age-chip").forEach(x=>x.classList.remove("active"));
  c.classList.add("active"); curAge=c.dataset.age; render();
}));
document.querySelectorAll(".sort-btn").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".sort-btn").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); curSort=b.dataset.sort; render();
}));
document.addEventListener("click",e=>{
  if(!document.getElementById("bell-btn").contains(e.target)&&!document.getElementById("notif-panel").contains(e.target))
    document.getElementById("notif-panel").classList.remove("open");
});

// ── AUTH ──────────────────────────────────────────────────
async function login(){
  const em=document.getElementById("lem").value.trim().toLowerCase();
  const pw=document.getElementById("lpw").value;
  const btn=document.getElementById("lbtn"),err=document.getElementById("lerr");
  err.style.display="none";
  if(!em||!pw)return;
  btn.disabled=true;btn.textContent="Signing in…";
  try{
    const r=await api("/api/login","POST",{email:em,password:pw},false);
    tok=r.token;localStorage.setItem("ns_t",tok);
    document.getElementById("login-page").style.display="none";
    document.getElementById("app").style.display="flex";
    boot();
  }catch{err.style.display="block";btn.disabled=false;btn.textContent="Sign In";}
}
function logout(){tok="";localStorage.removeItem("ns_t");clearInterval(cdInt);document.getElementById("app").style.display="none";document.getElementById("login-page").style.display="flex";}

async function api(path,method,body,auth){
  const h={"Content-Type":"application/json"};
  if(auth!==false)h["Authorization"]="Bearer "+tok;
  const r=await fetch(B+path,{method:method||"GET",headers:h,body:body?JSON.stringify(body):null});
  if(r.status===401){logout();throw 0;}
  if(!r.ok)throw await r.text();
  return r.json();
}

// ── BOOT ──────────────────────────────────────────────────
async function boot(){await Promise.allSettled([loadStocks(),loadIndices(),loadNotifs()]);startCD();}
function startCD(){cdSec=60;clearInterval(cdInt);cdInt=setInterval(async()=>{document.getElementById("cd").textContent=--cdSec;if(cdSec<=0){cdSec=60;await Promise.allSettled([loadStocks(),loadIndices(),loadNotifs()]);}},1000);}

// ── NOTIFICATIONS ─────────────────────────────────────────
async function loadNotifs(){
  try{
    const d=await api("/api/notifications");
    const newNotifs=d.notifications||[];
    const prevIds=new Set(notifs.map(n=>n.id));
    newNotifs.filter(n=>!prevIds.has(n.id)&&!n.read).forEach(n=>showToast(n));
    notifs=newNotifs;
    unreadCount=notifs.filter(n=>!n.read).length;
    updateBell();
    renderNotifPanel();
  }catch{}
}
function updateBell(){
  const badge=document.getElementById("bell-badge");
  badge.textContent=unreadCount;
  badge.className="bell-badge"+(unreadCount>0?" show":"");
}
function toggleNotifPanel(){
  document.getElementById("notif-panel").classList.toggle("open");
}
async function markAllRead(){
  try{await api("/api/notifications/read","POST");}catch{}
  notifs.forEach(n=>n.read=true);
  unreadCount=0;updateBell();renderNotifPanel();
}
function renderNotifPanel(){
  const el=document.getElementById("np-list");
  if(!notifs.length){el.innerHTML='<div class="np-empty">No notifications yet</div>';return;}
  el.innerHTML=notifs.map(n=>{
    const icon=n.type==="BUY"?"▲":n.type==="SELL"?"▼":"📈";
    const icls=n.type==="BUY"?"ni-buy":n.type==="SELL"?"ni-sell":"ni-rsi";
    return `<div class="np-item${n.read?"":" unread"}">
      <div class="np-icon ${icls}">${icon}</div>
      <div class="np-body">
        <div class="np-ntitle">${n.type==="BUY"?"▲ BUY":n.type==="SELL"?"▼ SELL":"📈 RSI Alert"} — ${n.symbol}</div>
        <div class="np-ndesc">${n.detail||n.name}</div>
        <div class="np-ntime">${n.timestamp}</div>
      </div>
    </div>`;
  }).join("");
}
function showToast(n){
  const container=document.getElementById("toast-container");
  const icon=n.type==="BUY"?"▲":n.type==="SELL"?"▼":"📈";
  const cls=n.type==="BUY"?"toast-buy":n.type==="SELL"?"toast-sell":"toast-rsi";
  const div=document.createElement("div");
  div.className=`toast ${cls}`;
  div.innerHTML=`<div class="toast-icon">${icon}</div>
    <div class="toast-body">
      <div class="toast-title">${n.type==="BUY"?"▲ BUY Signal":n.type==="SELL"?"▼ SELL Signal":"📈 RSI Alert"} — ${n.symbol}</div>
      <div class="toast-desc">${n.detail||n.name} · ₹${(n.price||0).toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
    </div>
    <button class="toast-close">✕</button>`;
  div.querySelector(".toast-close").addEventListener("click",()=>div.remove());
  container.appendChild(div);
  setTimeout(()=>div.remove(),6000);
  try{if(Notification.permission==="granted")new Notification(`${n.type} — ${n.symbol}`,{body:n.detail||n.name,icon:"/favicon.ico"});}catch{}
}

// ── INDEX CARDS ────────────────────────────────────────────
const IDX_MAP={"^NSEI":0,"^NSEBANK":1,"^CNXIT":2,"^CNXPHARMA":3,"^CNXAUTO":4};
const IDX_NAMES={"^NSEI":"NIFTY 50","^NSEBANK":"NIFTY BANK","^CNXIT":"NIFTY IT","^CNXPHARMA":"NIFTY PHARMA","^CNXAUTO":"NIFTY AUTO"};
const IDX_SYMS=["^NSEI","^NSEBANK","^CNXIT","^CNXPHARMA","^CNXAUTO"];

async function loadIndices(){
  try{
    const d=await api("/api/indices");
    const map={};
    (d.indices||[]).forEach(idx=>map[idx.symbol]=idx);
    renderIdxCards(map);
  }catch{}
}

function renderIdxCards(idxData){
  const primarySym="^NSEI";
  const secSyms=["^NSEBANK","^CNXIT","^CNXPHARMA","^CNXAUTO"];
  const idxSection=document.getElementById("p-market");
  let existingMarket=document.getElementById("market-below");
  const idxHtml=`<div class="idx-section">
    <div class="idx-section-title">Live Nifty Indices</div>
    <div class="idx-cards">
      ${[primarySym,...secSyms].map((sym,i)=>{
        const d=idxData[sym]||{};
        const up=(d.pct_change||0)>=0;
        const isPrim=i===0;
        const pStr=d.price?d.price.toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";
        const cStr=(up?"+":"")+((d.pct_change||0).toFixed(2))+"%";
        const chgStr=(d.change||0)>=0?"+"+((d.change||0).toFixed(2)):((d.change||0).toFixed(2));
        return `<div class="idx-card${isPrim?" primary":""}" id="icard-${sym.replace("^","")}">
          <div class="idx-card-top">
            <div class="idx-lbl">${IDX_NAMES[sym]||sym}</div>
            <div class="idx-val" style="color:${isPrim?"#fff":up?"var(--g)":"var(--r)"}">${pStr}</div>
            <div class="idx-chg" style="color:${isPrim?(up?"#4ade80":"#f87171"):(up?"var(--g)":"var(--r)")}">${up?"▲":"▼"} ${cStr} (${chgStr})</div>
            <div class="idx-meta"><span>O: ${d.day_open?d.day_open.toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2}):"—"}</span><span>H: ${d.day_high?d.day_high.toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2}):"—"}</span><span>L: ${d.day_low?d.day_low.toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2}):"—"}</span></div>
          </div>
          <div class="idx-periods">
            ${["1D","1W","1M","3M","6M","1Y"].map(p=>`<button class="idx-per-btn${p==="1M"?" active":""}" data-sym="${sym}" data-per="${p}">${p}</button>`).join("")}
          </div>
          <div class="idx-chart-wrap"><canvas class="idx-chart" id="ichart-${sym.replace("^","")}"></canvas></div>
        </div>`;
      }).join("")}
    </div>
  </div>`;
  if(!existingMarket){
    idxSection.innerHTML=idxHtml+'<div id="market-below"></div>';
    existingMarket=document.getElementById("market-below");
    document.querySelectorAll(".idx-per-btn").forEach(b=>{
      b.addEventListener("click",()=>{
        const sym=b.dataset.sym;
        document.querySelectorAll(`.idx-per-btn[data-sym="${sym}"]`).forEach(x=>x.classList.remove("active"));
        b.classList.add("active");
        loadIdxChart(sym,b.dataset.per);
      });
    });
    IDX_SYMS.forEach(sym=>loadIdxChart(sym,"1M"));
  } else {
    IDX_SYMS.forEach(sym=>{
      const d=idxData[sym]||{};
      const card=document.getElementById("icard-"+sym.replace("^",""));
      if(card){
        const up=(d.pct_change||0)>=0;
        const isPrim=sym===primarySym;
        const pStr=d.price?d.price.toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";
        const cStr=(up?"+":"")+((d.pct_change||0).toFixed(2))+"%";
        card.querySelector(".idx-val").textContent=pStr;
        card.querySelector(".idx-chg").textContent=(up?"▲":"▼")+" "+cStr;
      }
    });
  }
}

async function loadIdxChart(sym,per){
  const canvasId="ichart-"+sym.replace("^","");
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  // Set explicit pixel dimensions before drawing
  const wrap=canvas.parentElement;
  canvas.width=wrap.offsetWidth||300;
  canvas.height=wrap.offsetHeight||80;
  try{
    const d=await api(`/api/index-history/${encodeURIComponent(sym)}/${per}`);
    const rows=d.data||[];
    if(!rows.length)return;
    const labels=rows.map(r=>r.date);
    const closes=rows.map(r=>r.close).filter(v=>v!=null);
    if(closes.length<2)return;
    const isPrim=sym==="^NSEI";
    const up=closes[closes.length-1]>=closes[0];
    const lineColor=isPrim?(up?"#4ade80":"#f87171"):(up?"#00b386":"#e5383b");
    if(idxCharts[canvasId]){idxCharts[canvasId].destroy();delete idxCharts[canvasId];}
    const ctx=canvas.getContext("2d");
    const grad=ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,up?"rgba(0,179,134,.2)":"rgba(229,56,59,.15)");
    grad.addColorStop(1,"rgba(255,255,255,0)");
    idxCharts[canvasId]=new Chart(ctx,{
      type:"line",
      data:{labels,datasets:[{data:closes,borderColor:lineColor,borderWidth:2,pointRadius:0,tension:.4,fill:true,backgroundColor:grad}]},
      options:{responsive:false,maintainAspectRatio:false,animation:{duration:400},
        plugins:{legend:{display:false},tooltip:{enabled:false}},
        scales:{x:{display:false},y:{display:false}}}
    });
  }catch(e){log.error&&log.error(e);}
}

// ── SIGNALS ────────────────────────────────────────────────
async function loadStocks(){
  try{
    const d=await api("/api/signals");
    stocks=d.stocks||[];
    const isO=d.is_market_open;
    const mb=document.getElementById("mbadge");
    mb.textContent="● "+(isO?"MARKET OPEN":"MARKET CLOSED");

function goTab(tab){

  document.getElementById("p-"+tab).classList.add("active");

function getF(){
  const q=document.getElementById("qry").value.toLowerCase();
  const sec=document.getElementById("sec").value;
  return stocks.filter(s=>(!q||s.symbol.toLowerCase().includes(q)||s.name.toLowerCase().includes(q))&&(!sec||s.sector===sec));
}

function filterByAge(list){
  if(curAge==="all")return list;
  const now=new Date(); const today=now.toISOString().slice(0,10);
  const weekAgo=new Date(now-7*86400000).toISOString().slice(0,10);
  const monthAgo=new Date(now-30*86400000).toISOString().slice(0,10);
  return list.filter(s=>{
    if(!s.signal_date)return false;
    if(curAge==="today")return s.signal_date===today;
    if(curAge==="week")return s.signal_date>=weekAgo;
    if(curAge==="month")return s.signal_date>=monthAgo;
    return true;
  });
}

function sortSignals(list){
  const sl=[...list];
  if(curSort==="date")return sl.sort((a,b)=>(b.signal_date||"").localeCompare(a.signal_date||""));
  if(curSort==="pnl_best")return sl.sort((a,b)=>(b.pct_change||0)-(a.pct_change||0));
  if(curSort==="pnl_worst")return sl.sort((a,b)=>(a.pct_change||0)-(b.pct_change||0));
  return sl;
}

function render(){
  const f=getF();
  if(curTab==="market")doMarket(f);
  else if(curTab==="buy")doBuy(sortSignals(filterByAge(f.filter(s=>s.signal==="BUY"))));
  else if(curTab==="sell")doSell(sortSignals(filterByAge(f.filter(s=>s.signal==="SELL"))));
  else if(curTab==="hold")doHold(f.filter(s=>s.signal==="HOLD"));
}

function fmt(v){return v!=null?"₹"+v.toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";}
function pctStr(v){if(v==null)return"—";return(v>=0?"+":"")+v.toFixed(2)+"%";}
function pctCls(v){return v>0?"pu":v<0?"pd":"pf";}

function spark(el,prices,up){
  if(!prices||prices.length<2)return;
  const W=el.width,H=el.height,ctx=el.getContext("2d");
  ctx.clearRect(0,0,W,H);
  const mn=Math.min(...prices),mx=Math.max(...prices),rng=mx-mn||1;
  const pts=prices.map((p,i)=>({x:(i/(prices.length-1))*(W-2)+1,y:H-((p-mn)/rng)*(H-4)-2}));
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++)ctx.quadraticCurveTo(pts[i-1].x,pts[i-1].y,(pts[i-1].x+pts[i].x)/2,(pts[i-1].y+pts[i].y)/2);
  ctx.quadraticCurveTo(pts[pts.length-2].x,pts[pts.length-2].y,pts[pts.length-1].x,pts[pts.length-1].y);
  ctx.strokeStyle=up?"#00b386":"#e5383b";ctx.lineWidth=1.8;ctx.lineJoin=ctx.lineCap="round";ctx.stroke();
  const last=pts[pts.length-1];ctx.lineTo(last.x,H);ctx.lineTo(pts[0].x,H);ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,up?"rgba(0,179,134,.18)":"rgba(229,56,59,.14)");g.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle=g;ctx.fill();
}

function renderCharts(ohlcv){

  const ema26s=ohlcv.map(r=>r.ema26);
  const rsi14s=ohlcv.map(r=>r.rsi14);
  const vols=ohlcv.map(r=>r.volume||0);
  const up=closes.length>1&&closes[closes.length-1]>=closes[0];

  const conjPlugin={id:"cj",beforeDraw(chart){
    if(!inds.conj)return;
    const{ctx,chartArea:{top,bottom},scales:{x}}=chart;
    ohlcv.forEach((r,i)=>{
      if(!r.conjunction)return;
      const x1=x.getPixelForValue(i-.5),x2=x.getPixelForValue(i+.5);

    });
    ohlcv.forEach((r,i)=>{
      if(!r.buy_signal&&!r.sell_signal)return;
      const xp=x.getPixelForValue(i);
      ctx.save();ctx.strokeStyle=r.buy_signal?"#00b386":"#e5383b";ctx.lineWidth=1.5;ctx.setLineDash([5,3]);
      ctx.beginPath();ctx.moveTo(xp,top);ctx.lineTo(xp,bottom);ctx.stroke();ctx.restore();
    });
  }};

  const pCtx=document.getElementById("mc-price").getContext("2d");
  const priceGrad=pCtx.createLinearGradient(0,0,0,280);
  priceGrad.addColorStop(0,up?"rgba(0,179,134,.15)":"rgba(229,56,59,.12)");
  priceGrad.addColorStop(1,"rgba(255,255,255,0)");
  const pDs=[{label:"Price",data:closes,borderColor:up?"#00b386":"#e5383b",borderWidth:2.5,pointRadius:0,tension:.3,fill:true,backgroundColor:priceGrad}];
  if(inds.sma5)pDs.push({label:"SMA5",data:sma5s,borderColor:"#f59e0b",borderWidth:1.5,pointRadius:0,tension:.3,fill:false,borderDash:[5,3]});
  if(inds.ema13)pDs.push({label:"EMA13",data:ema13s,borderColor:"#00b386",borderWidth:1.5,pointRadius:0,tension:.3,fill:false});
  if(inds.ema26)pDs.push({label:"EMA26",data:ema26s,borderColor:"#e5383b",borderWidth:1.5,pointRadius:0,tension:.3,fill:false});
  mChPrice=new Chart(pCtx,{type:"line",data:{labels,datasets:pDs},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:"rgba(255,255,255,.97)",titleColor:"#0f172a",bodyColor:"#64748b",borderColor:"#e5e7eb",borderWidth:1,padding:10,callbacks:{label:c=>" "+c.dataset.label+": "+fmt(c.parsed.y)}}},
      scales:{x:{grid:{color:"#f8fafc"},ticks:{color:"#94a3b8",font:{size:9},maxTicksLimit:10}},y:{grid:{color:"#f8fafc"},ticks:{color:"#94a3b8",font:{size:9},callback:v=>fmt(v)}}}
    },plugins:[conjPlugin]});

  if(inds.rsi){
    const rCtx=document.getElementById("mc-rsi").getContext("2d");
    const rsiPlugin={id:"rsilines",beforeDraw(chart){
      const{ctx,chartArea:{left,right},scales:{y}}=chart;
      [30,50,70].forEach((val,i)=>{
        const yp=y.getPixelForValue(val);
        ctx.save();ctx.strokeStyle=i===1?"rgba(100,116,139,.6)":"rgba(100,116,139,.3)";ctx.lineWidth=1;
        ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(left,yp);ctx.lineTo(right,yp);ctx.stroke();ctx.restore();
      });
    }};
    mChRSI=new Chart(rCtx,{type:"line",data:{labels,datasets:[{label:"RSI 14",data:rsi14s,borderColor:"#7c3aed",borderWidth:1.5,pointRadius:0,tension:.3,fill:false}]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
        plugins:{legend:{display:false},tooltip:{backgroundColor:"rgba(255,255,255,.97)",titleColor:"#0f172a",bodyColor:"#64748b",borderColor:"#e5e7eb",borderWidth:1,callbacks:{label:c=>` RSI: ${(c.parsed.y||0).toFixed(1)}`}}},
        scales:{x:{display:false},y:{min:0,max:100,grid:{color:"#f8fafc"},ticks:{color:"#94a3b8",font:{size:9},stepSize:25}}}
      },plugins:[rsiPlugin]});
  }else{document.getElementById("mc-rsi").getContext("2d").clearRect(0,0,999,999);}

  if(inds.vol){
    const vCtx=document.getElementById("mc-vol").getContext("2d");
    const volColors=ohlcv.map((r,i)=>i>0&&(r.close||0)>=(ohlcv[i-1].close||0)?"rgba(0,179,134,.5)":"rgba(229,56,59,.5)");
    mChVol=new Chart(vCtx,{type:"bar",data:{labels,datasets:[{label:"Volume",data:vols,backgroundColor:volColors,borderRadius:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"rgba(255,255,255,.97)",titleColor:"#0f172a",bodyColor:"#64748b",borderColor:"#e5e7eb",borderWidth:1,callbacks:{label:c=>` Vol: ${(c.parsed.y||0).toLocaleString("en-IN")}`}}},
        scales:{x:{display:false},y:{grid:{display:false},ticks:{color:"#94a3b8",font:{size:9},callback:v=>v>=1e7?`${(v/1e7).toFixed(0)}Cr`:v>=1e5?`${(v/1e5).toFixed(0)}L`:`${v}`}}}}});
  }else{document.getElementById("mc-vol").getContext("2d").clearRect(0,0,999,999);}
}

function renderModalConditions(info){
  const sig=info.signal||"HOLD";
  const iB=sig==="BUY",iS=sig==="SELL";
  document.getElementById("mch").textContent=sig==="HOLD"?"Current Signal Conditions":"Why This "+sig+" Signal Fired";
  const c1=info.conjunction;
  const c2=iB?(info.current_price>info.sma5):iS?(info.current_price<info.sma5):false;
  const c3=iB?(info.sma5>info.ema13):iS?(info.sma5<info.ema13):false;
  const c4=info.vol_confirm;
  const conds=[
    {ok:c1,i:"🔵",t:"Lines Converged",m:"SMA5, EMA13 & EMA26 all inside each other's ±1% band.",n:"Lines still spread apart. Signal cannot fire."},
    {ok:c2,i:iB?"⬆️":iS?"⬇️":"↔️",t:iB?"Price Above Zone":iS?"Price Below Zone":"Price Position",m:iB?"Price broke above the convergence zone — bullish.":"Price fell through — bearish.",n:"Price inside zone. Waiting for directional break."},
    {ok:c3,i:iB?"📈":iS?"📉":"📊",t:"Trend Direction",m:iB?"SMA5 rising — upward momentum building.":"SMA5 falling — downward pressure confirmed.",n:"SMA5 flat. No clear direction."},
    {ok:c4,i:"🔊",t:"Volume Surge",m:"Volume > 1.5× 20-day average — real conviction.",n:"Volume below threshold. Waiting for confirmation."}
  ];
  document.getElementById("mccg").innerHTML=conds.map(c=>`<div class="mcc ${c.ok?"ok":"no"}"><div class="mci">${c.i}</div><div class="mct">${c.ok?"✓ ":"✗ "}${c.t}</div><div class="mcd">${c.ok?c.m:c.n}</div></div>`).join("");
  document.getElementById("msts").innerHTML=[
    {l:"Signal",v:sig,pill:1,cls:sig==="BUY"?"spb":sig==="SELL"?"sps":"sph"},
    {l:"Signal Price",v:fmt(info.signal_price)},
    {l:"Signal Date",v:info.signal_date||"—"},
    {l:"P & L",v:pctStr(info.pct_change),st:(info.pct_change||0)>=0?"color:var(--g)":"color:var(--r)"},
    {l:"SMA5",v:info.sma5?info.sma5.toFixed(2):"—",st:"color:#f59e0b"},
    {l:"EMA13",v:info.ema13?info.ema13.toFixed(2):"—",st:"color:#00b386"},
    {l:"EMA26",v:info.ema26?info.ema26.toFixed(2):"—",st:"color:#e5383b"},
    {l:"RSI 14",v:info.rsi14?info.rsi14.toFixed(1):"—",st:"color:var(--p)"},
  ].map(s=>`<div class="mst"><div class="mstl">${s.l}</div><div class="mstv ${s.cls||""}" style="${s.st||""}">${s.pill?`<span class="sp ${s.cls}">${s.v}</span>`:s.v}</div></div>`).join("");
}

function closeModal(){document.getElementById("mbg").classList.remove("open");destroyCharts();}
function emptyBox(t,s){return `<div class="empty"><div class="ei">📭</div><div class="et">${t}</div><div class="es">${s}</div></div>`;}

(async()=>{
  if(tok){try{await api("/api/health");document.getElementById("login-page").style.display="none";document.getElementById("app").style.display="flex";boot();}catch{tok="";localStorage.removeItem("ns_t");}}
})();
</script>
